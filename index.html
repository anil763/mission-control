<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mission Control</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#050508;--surface:#0a0a10;--text:#f5f7ff;--muted:#a7adbe;
--accent:#2E86FF;--accent2:#0AF;--card:rgba(255,255,255,.04);
--border:rgba(255,255,255,.06);--ok:#3ed598;--warn:#ffb648;--danger:#ff5d73;
--gold:#C9A84C;
--r:14px;--font:'Inter',system-ui,sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:1rem;padding:.8rem 2rem;
background:linear-gradient(180deg,rgba(10,10,16,.97),rgba(8,8,14,.92));backdrop-filter:blur(12px);
border-bottom:1px solid var(--border)}
.logo{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;cursor:default;letter-spacing:-.5px}

/* tabs */
.tabs{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:.5rem 1rem;border-radius:8px;font-size:.8rem;font-weight:600;color:var(--muted);
cursor:pointer;white-space:nowrap;transition:all .2s;border:1px solid transparent;user-select:none;
display:flex;align-items:center;gap:.4rem}
.tab:hover{color:var(--text);background:rgba(46,134,255,.12)}
.tab.active{color:#fff;background:rgba(46,134,255,.28);border-color:rgba(46,134,255,.3)}
.tab-icon{font-size:.9rem;opacity:.7;line-height:1}
.tab.active .tab-icon{opacity:1}
.tab.today-tab{color:var(--gold)}
.tab.today-tab.active{color:#fff;background:rgba(201,168,76,.28);border-color:rgba(201,168,76,.3)}

/* status dot */
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pulse 1.6s infinite;margin-left:auto;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── MAIN ── */
.main{max-width:1600px;margin:0 auto;padding:2rem 2rem 4rem}
.pane{display:none;animation:up .4s ease}
.pane.active{display:block}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* cards */
.card{background:linear-gradient(180deg,rgba(10,10,16,.96),rgba(8,8,14,.93));
border:1px solid var(--border);border-radius:var(--r);padding:1.2rem;transition:border-color .2s}
.card:hover{border-color:rgba(46,134,255,.2)}
.card h3{font-size:.85rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.8rem}
.card .big{font-size:2rem;font-weight:800}

/* grids */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
.grid-1-2{display:grid;grid-template-columns:1fr 2fr;gap:1rem}

/* section titles */
.section-title{font-size:1.1rem;font-weight:700;margin:2rem 0 1rem;display:flex;align-items:center;gap:.5rem}
.section-title::before{content:'';width:3px;height:18px;background:var(--accent);border-radius:2px}
.section-title.gold::before{background:var(--gold)}

/* badges */
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.7rem;font-weight:700;text-transform:uppercase}
.badge-ok{background:rgba(62,213,152,.15);color:var(--ok)}
.badge-warn{background:rgba(255,182,72,.15);color:var(--warn)}
.badge-danger{background:rgba(255,93,115,.15);color:var(--danger)}
.badge-accent{background:rgba(46,134,255,.15);color:var(--accent)}
.badge-gold{background:rgba(201,168,76,.15);color:var(--gold)}

/* progress bar */
.progress-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-top:.5rem}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease;background:linear-gradient(90deg,var(--accent),var(--accent2))}

/* gauge */
.gauge-wrap{display:flex;justify-content:center;padding:1rem 0}
.gauge{width:200px;height:200px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
.gauge-inner{width:150px;height:150px;border-radius:50%;background:var(--surface);display:flex;flex-direction:column;
align-items:center;justify-content:center;z-index:1}
.gauge-pct{font-size:2.2rem;font-weight:800}
.gauge-label{font-size:.75rem;color:var(--muted)}

/* checklist */
.check-item{display:flex;align-items:center;gap:.6rem;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.9rem}
.check-item:last-child{border-bottom:none}
.check-item input[type="checkbox"]{accent-color:var(--accent);width:16px;height:16px;cursor:pointer}
.check-item.done span{text-decoration:line-through;color:var(--muted)}

/* activity feed */
.feed-item{padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.85rem;display:flex;gap:.5rem}
.feed-item:last-child{border-bottom:none}
.feed-time{color:var(--accent);font-weight:600;white-space:nowrap;font-size:.75rem;min-width:52px}

/* client table */
.tbl{width:100%;border-collapse:collapse;font-size:.85rem}
.tbl th{text-align:left;color:var(--muted);font-weight:600;padding:.5rem;border-bottom:1px solid var(--border);font-size:.75rem;text-transform:uppercase}
.tbl td{padding:.5rem;border-bottom:1px solid var(--border)}

/* input styles */
.inp{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:.5rem .8rem;
color:var(--text);font-family:var(--font);font-size:.85rem;outline:none;width:100%;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:rgba(255,255,255,.25)}
select.inp{cursor:pointer}

.btn{padding:.5rem 1.2rem;border-radius:8px;border:none;font-family:var(--font);font-weight:600;
font-size:.8rem;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#6a4ae0}
.btn-sm{padding:.35rem .8rem;font-size:.75rem}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--accent);color:var(--text)}
.btn-danger{background:rgba(255,93,115,.15);color:var(--danger)}
.btn-danger:hover{background:rgba(255,93,115,.3)}
.btn-gold{background:var(--gold);color:#0D0D14}
.btn-gold:hover{background:#d4b45c}

/* revenue chart */
.chart-container{position:relative;height:240px;margin-top:1rem}
.chart-container canvas{width:100%!important;height:100%!important}

/* daily ops domain card */
.domain-card{margin-bottom:.5rem}
.domain-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.domain-header h4{font-size:.9rem;font-weight:700}
.domain-count{font-size:.75rem;color:var(--muted)}
.add-row{display:flex;gap:.5rem;margin-top:.6rem}
.add-row .inp{flex:1}

/* timeline */
.timeline-line{position:relative;padding-left:2rem}
.timeline-line::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:1.5rem}
.tl-dot{position:absolute;left:-2rem;top:4px;width:18px;height:18px;border-radius:50%;
background:var(--surface);border:2px solid var(--border);z-index:1}
.tl-item.current .tl-dot{border-color:var(--accent);box-shadow:0 0 12px rgba(46,134,255,.4)}
.tl-item h4{font-size:.95rem;font-weight:700;margin-bottom:.2rem}
.tl-date{font-size:.75rem;color:var(--muted);margin-bottom:.3rem}
.tl-desc{font-size:.85rem;color:var(--muted);line-height:1.5}

/* notes */
.notes-area{width:100%;min-height:400px;background:rgba(255,255,255,.03);border:1px solid var(--border);
border-radius:var(--r);padding:1rem;color:var(--text);font-family:var(--font);font-size:.9rem;
line-height:1.6;resize:vertical;outline:none}
.notes-area:focus{border-color:var(--accent)}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;
align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;
width:90%;max-width:450px;animation:up .3s ease}
.modal h3{margin-bottom:1rem;font-size:1.1rem}
.modal .field{margin-bottom:.8rem}
.modal .field label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:.3rem;font-weight:600;text-transform:uppercase}
.modal-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem}

/* file cards */
.file-card{display:flex;align-items:center;gap:1rem;padding:1rem;background:linear-gradient(180deg,rgba(10,10,16,.96),rgba(8,8,14,.93));
border:1px solid var(--border);border-radius:var(--r);transition:all .2s;cursor:pointer;text-decoration:none;color:var(--text)}
.file-card:hover{border-color:rgba(46,134,255,.3);transform:translateY(-1px)}
.file-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;
font-size:1.1rem;font-weight:800;flex-shrink:0}
.file-icon.html{background:rgba(255,93,115,.15);color:var(--danger)}
.file-icon.xlsx{background:rgba(62,213,152,.15);color:var(--ok)}
.file-icon.txt{background:rgba(255,182,72,.15);color:var(--warn)}
.file-icon.css{background:rgba(46,134,255,.15);color:var(--accent)}
.file-icon.doc{background:rgba(74,139,255,.15);color:var(--accent2)}
.file-icon.link{background:rgba(46,134,255,.15);color:var(--accent)}
.file-info{flex:1;min-width:0}
.file-info h4{font-size:.9rem;font-weight:700;margin-bottom:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-info p{font-size:.75rem;color:var(--muted);line-height:1.4}
.file-badge{font-size:.65rem;padding:2px 8px;border-radius:12px;font-weight:700;text-transform:uppercase;flex-shrink:0}
.file-section{margin-bottom:2rem}
.file-section h3{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:.8rem;
padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.file-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem}

/* ── TODAY TAB STYLES ── */
.script-card{background:linear-gradient(180deg,rgba(15,15,22,.98),rgba(10,10,16,.95));
border:1px solid rgba(201,168,76,.2);border-radius:var(--r);padding:1.5rem;margin-bottom:1.5rem}
.script-card h3{color:var(--gold);font-size:1rem;margin-bottom:.3rem;text-transform:none;letter-spacing:0}
.script-card .script-meta{font-size:.75rem;color:var(--muted);margin-bottom:1rem;display:flex;gap:1rem;flex-wrap:wrap}
.script-card .script-meta span{display:inline-flex;align-items:center;gap:.3rem}
.script-body{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:1.2rem;
font-size:.9rem;line-height:1.8;color:#ddd;white-space:pre-wrap;font-family:var(--font)}
.script-body .label{color:var(--gold);font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.3px}
.caption-box{background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:1rem;
margin-top:1rem;font-size:.85rem;line-height:1.7;color:#bbb}
.caption-box strong{color:var(--text)}
.hashtag-row{margin-top:.6rem;font-size:.8rem;color:var(--muted)}
.copy-btn{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3);
border-radius:8px;padding:.4rem 1rem;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font)}
.copy-btn:hover{background:rgba(201,168,76,.3)}
.task-section{margin-bottom:1.5rem}
.task-section h4{font-size:.85rem;color:var(--gold);font-weight:700;margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem}
.task-section h4 .task-count{font-size:.7rem;color:var(--muted);font-weight:500}

/* responsive */
@media(max-width:1200px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:1fr}.grid-1-2{grid-template-columns:1fr}}
@media(max-width:768px){
.header{flex-wrap:wrap;padding:.6rem 1rem}.tabs{order:3;width:100%}
.main{padding:1rem}.grid-4,.grid-2,.file-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ══════ HEADER ══════ -->
<div class="header">
<div class="logo">Mission Control</div>
<div class="tabs" id="tabs"></div>
<div class="status-dot" title="Active"></div>
</div>

<!-- ══════ MAIN ══════ -->
<div class="main" id="main"></div>

<!-- ══════ MODAL ══════ -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
<div class="modal" id="modalBox"></div>
</div>

<script>
// ═══════════════════════════════════════════
// DATA LAYER — localStorage persistence
// ═══════════════════════════════════════════
const LS_KEY = 'ab_mc_';
const DATA_VERSION = 'mar2026v3';
// Migrate: keep data if only minor version bump
const oldVersion = localStorage.getItem(LS_KEY + 'version');
if (oldVersion !== DATA_VERSION && !oldVersion?.startsWith('mar2026')) {
  Object.keys(localStorage).filter(k => k.startsWith(LS_KEY)).forEach(k => localStorage.removeItem(k));
}
localStorage.setItem(LS_KEY + 'version', DATA_VERSION);

function load(k, def) { try { const v = localStorage.getItem(LS_KEY + k); return v ? JSON.parse(v) : def; } catch { return def; } }
function save(k, v) { localStorage.setItem(LS_KEY + k, JSON.stringify(v)); }

// ── STATE ──
const S = {
  rev: load('rev', 0),
  monthlyGoal: load('monthlyGoal', 2000),
  bigGoal: load('bigGoal', 30000),
  bigGoalDate: load('bigGoalDate', '2026-07-01'),
  priorities: load('priorities', [
    { text: 'Record daily numerology video', done: false },
    { text: 'Record GV Day 1 video — The Mask', done: false },
    { text: 'Paste updated GV page into WordPress', done: false },
    { text: 'Send 20 brand outreach emails (Bento)', done: false },
    { text: 'Reply to comments + DM mask emoji people', done: false },
  ]),
  activity: load('activity', [
    { time: '2026-03-01 00:00', text: 'March begins — $2K target. GV launch Day 1 of 14.' },
  ]),
  clients: load('clients', [
    { name: 'Dermawell', value: 175, status: 'active', type: 'UGC', date: '2026-02-25' },
    { name: 'Freebird', value: 175, status: 'pending', type: 'UGC', date: '2026-02-25' },
  ]),
  readings: load('readings', [
    { name: 'Personal Blueprint', price: 97, sold: 0 },
    { name: 'Compatibility', price: 159, sold: 0 },
    { name: 'Deep Dive Audio', price: 297, sold: 0 },
    { name: 'Ancestral Pattern', price: 397, sold: 0 },
    { name: 'Strategic Timing', price: 497, sold: 0 },
    { name: 'Annual Forecast', price: 997, sold: 0 },
  ]),
  revMonths: load('revMonths', [
    { month: 'Oct', amount: 0 },
    { month: 'Nov', amount: 0 },
    { month: 'Dec', amount: 0 },
    { month: 'Jan', amount: 100 },
    { month: 'Feb', amount: 920 },
    { month: 'Mar', amount: 0 },
  ]),
  todayTasks: load('todayTasks', {
    'Morning — Content': [
      { text: 'Record daily numerology video (script below)', done: false },
      { text: 'Post numerology video to TikTok, IG, YT, FB', done: false },
      { text: 'Record GV Day 1 — "The Mask" (script below)', done: false },
      { text: 'Post GV video to TikTok, IG, YT, FB', done: false },
    ],
    'Morning — Outreach': [
      { text: 'Send 20 outreach emails (Bento)', done: false },
      { text: 'Send brand requests (Backstage)', done: false },
      { text: 'Create UGC video for brand deal', done: false },
    ],
    'Admin — WordPress': [
      { text: 'Paste updated GV page HTML into WordPress', done: false },
      { text: 'Set up GHL automation (tag + auto-reply on form submit)', done: false },
    ],
    'Evening — Engagement': [
      { text: 'Reply to ALL comments on numerology video', done: false },
      { text: 'Reply to ALL comments on GV Mask video', done: false },
      { text: 'Reply to birthday comments with quick number insights', done: false },
      { text: 'DM anyone who drops 🎭 — "Felt that too. There\'s more coming."', done: false },
      { text: 'Follow up warm leads from Feb launch', done: false },
    ],
  }),
  dailyOps: load('dailyOps', {}),
  projects: load('projects', [
    { title: "Gentleman's Vault Launch", desc: 'Business plan DONE. Sales page rebuilt. GHL form live. 14-day launch started. Doors open Mar 14.', priority: 'high', col: 'progress', created: '2026-02-25' },
    { title: 'Website Sales Pages', desc: '5 Blueprint Code reading pages — DONE', priority: 'medium', col: 'done', created: '2026-02-25' },
    { title: 'Skool Community Setup', desc: 'Playbook done. Need to create Skool, set tiers, record welcome video + Course 1 Modules 1-2 by Mar 13', priority: 'high', col: 'progress', created: '2026-03-01' },
    { title: 'Apollo Lead Gen Setup', desc: 'Configure Apollo for UGC brand prospecting', priority: 'high', col: 'progress', created: '2026-02-25' },
    { title: 'CapGemini Follow-up', desc: 'Final interview done 2/24 — awaiting response', priority: 'medium', col: 'progress', created: '2026-02-24' },
  ]),
  timeline: load('timeline', [
    { title: 'Phase 1 — Foundation + GV Launch', range: 'Feb 25 – Mar 14', desc: 'Daily content + 20 outreach/day + 14-day GV launch campaign + open Vault doors', milestones: ['Daily video habit locked in','14-day GV content campaign','Vault doors open Mar 14','First founding members enrolled'], current: true },
    { title: 'Phase 2 — Momentum', range: 'Mar 15 – Apr 15', desc: 'Scale outreach to 50/day, grow Vault membership, hit $2K/mo', milestones: ['$2K/month revenue','10+ reading clients','Vault growing weekly','5+ UGC brand deals'] },
    { title: 'Phase 3 — Scale', range: 'Apr 16 – May 31', desc: 'Vault at capacity, multiple revenue streams, approach $10K/mo', milestones: ['Vault at founding capacity','Course content complete','$10K/month revenue','Referral engine working'] },
    { title: 'Phase 4 — Freedom', range: 'Jun 1 – Jul 31', desc: 'Hit $30K/month between readings + UGC + Vault memberships', milestones: ['$30K/month revenue','Presidio exit plan finalized','Vault growing organically','Multiple revenue streams flowing'] },
  ]),
  notes: load('notes', 'Mission Control Notes\n─────────────────\n\n• Blueprint Code™ framework is LIVE — all reading pages published\n• GG33 source PDFs can be deleted — all knowledge extracted\n• When client orders reading: provide name + DOB → Claude generates full framework\n• Mobile menu fix: WPCode Header injection (Astra theme override)\n• CapGemini final interview done 2/24 — waiting to hear back\n• GV 14-day launch started Mar 1 — doors open Mar 14\n• Skool community playbook complete — need to set up platform by Mar 13\n• Record: Welcome video + Course 1 Modules 1-2 before Mar 14\n'),
  outreach: load('outreach', { sent: 0, replied: 0, booked: 0 }),
  social: load('social', { tiktok: 500, instagram: 300, youtube: 150, facebook: 50 }),
  ytd: load('ytd', { prevRev: 920, readingsSold: 5, readingsRev: 545, ugcRev: 375, outreachSent: 115, outreachReplied: 0 }),
};

// persist helpers
function saveAll() {
  save('rev', S.rev); save('monthlyGoal', S.monthlyGoal); save('bigGoal', S.bigGoal);
  save('bigGoalDate', S.bigGoalDate); save('priorities', S.priorities); save('activity', S.activity);
  save('clients', S.clients); save('readings', S.readings); save('revMonths', S.revMonths);
  save('todayTasks', S.todayTasks); save('dailyOps', S.dailyOps); save('projects', S.projects);
  save('timeline', S.timeline); save('notes', S.notes); save('outreach', S.outreach);
  save('social', S.social); save('ytd', S.ytd);
}

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
const TABS = [
  { name: 'Today', icon: '🎯', special: true },
  { name: 'Dashboard', icon: '⊞' },
  { name: 'Revenue', icon: '◎' },
  { name: 'Readings', icon: '✦' },
  { name: 'Outreach', icon: '↗' },
  { name: 'Projects', icon: '▦' },
  { name: 'Timeline', icon: '◈' },
  { name: 'Files', icon: '◉' },
  { name: 'Notes', icon: '✎' },
];
let activeTab = 'Today';

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = TABS.map(t =>
    `<div class="tab ${t.name===activeTab?'active':''} ${t.special?'today-tab':''}" onclick="switchTab('${t.name}')"><span class="tab-icon">${t.icon}</span>${t.name}</div>`
  ).join('');
}

function switchTab(t) {
  activeTab = t;
  renderTabs();
  renderPane();
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
const $ = s => document.querySelector(s);
const money = n => '$' + Number(n).toLocaleString();
const pct = (a,b) => b ? Math.min(Math.round((a/b)*100),100) : 0;
const now = () => { const d = new Date(); return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); };
const today = () => new Date().toISOString().slice(0,10);

function addActivity(text) {
  S.activity.unshift({ time: today() + ' ' + now(), text });
  if (S.activity.length > 100) S.activity.length = 100;
  saveAll();
}

function daysUntil(dateStr) {
  const diff = new Date(dateStr) - new Date();
  return Math.max(0, Math.ceil(diff / 86400000));
}

function totalReadingsRev() {
  return S.readings.reduce((s,r) => s + (r.price * r.sold), 0);
}

function totalClientsRev() {
  return S.clients.reduce((s,c) => s + c.value, 0);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:2rem;right:2rem;background:var(--gold);color:#0D0D14;padding:.6rem 1.2rem;border-radius:8px;font-weight:600;font-size:.85rem;z-index:999;animation:up .3s ease';

  });
}

function afterRevenue() {
  const canvas = document.getElementById('revChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const pad = { t: 20, r: 20, b: 40, l: 60 };
  const data = S.revMonths;
  const maxVal = Math.max(...data.map(d => d.amount), S.monthlyGoal) * 1.2 || 1000;
  const barW = Math.min(50, (w - pad.l - pad.r) / data.length * 0.6);
  const gap = (w - pad.l - pad.r) / data.length;

  ctx.strokeStyle = 'rgba(255,255,255,.06)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (h - pad.t - pad.b) * (1 - i/4);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w - pad.r, y); ctx.stroke();
    ctx.fillStyle = '#a7adbe'; ctx.font = '11px Inter';
    ctx.fillText(money(Math.round(maxVal * i/4)), 4, y + 4);
  }

  const goalY = pad.t + (h - pad.t - pad.b) * (1 - S.monthlyGoal/maxVal);
  ctx.strokeStyle = 'rgba(46,134,255,.4)'; ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(pad.l, goalY); ctx.lineTo(w - pad.r, goalY); ctx.stroke();
  ctx.setLineDash([]); ctx.fillStyle = '#2E86FF'; ctx.font = '10px Inter';
  ctx.fillText('Goal: ' + money(S.monthlyGoal), w - pad.r - 80, goalY - 6);

  data.forEach((d, i) => {
    const x = pad.l + gap * i + (gap - barW) / 2;
    const barH = (d.amount / maxVal) * (h - pad.t - pad.b);
    const y = h - pad.b - barH;
    const grad = ctx.createLinearGradient(x, y, x, h - pad.b);
    grad.addColorStop(0, '#2E86FF'); grad.addColorStop(1, '#4a8bff');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(x, y, barW, barH, [4,4,0,0]); ctx.fill();
    ctx.fillStyle = '#a7adbe'; ctx.font = '11px Inter'; ctx.textAlign = 'center';
    ctx.fillText(d.month, x + barW/2, h - pad.b + 18);
    if (d.amount > 0) { ctx.fillStyle = '#f5f7ff'; ctx.font = '600 11px Inter'; ctx.fillText(money(d.amount), x + barW/2, y - 6); }
    ctx.textAlign = 'start';
  });
}

function resetMonth() {

    <div class="field"><label>New Month Name (e.g. Apr)</label><input class="inp" id="newMonthName" placeholder="Apr"></div>
    <div class="modal-actions">

      <button class="btn btn-danger" onclick="confirmResetMonth()">Reset Everything</button>
    </div>
  `);

function confirmResetMonth() {
  const newMonth = document.getElementById('newMonthName').value.trim() || 'New';
  S.ytd.prevRev += S.rev;
  S.ytd.readingsSold += S.readings.reduce((s,r) => s + r.sold, 0);
  S.ytd.readingsRev += totalReadingsRev();
  S.ytd.outreachSent += S.outreach.sent;
  S.ytd.outreachReplied += S.outreach.replied;
  const lastMonth = S.revMonths[S.revMonths.length - 1];
  if (lastMonth) lastMonth.amount = S.rev;
  S.revMonths.push({ month: newMonth, amount: 0 });
  if (S.revMonths.length > 6) S.revMonths.shift();
  S.rev = 0;
  S.readings.forEach(r => r.sold = 0);
  S.outreach = { sent: 0, replied: 0, booked: 0 };
  S.priorities.forEach(p => p.done = false);
  Object.values(S.todayTasks).forEach(items => items.forEach(t => t.done = false));
  S.activity = [{ time: new Date().toISOString().slice(0,10) + ' 00:00', text: `New month: ${newMonth} — fresh start` }];
  saveAll(); closeModal(); renderPane();
}
